<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 300">
  <rect width="100%" height="100%" fill="white"/>
  
  <!-- Uniform Sampling -->
  <text x="50" y="30" font-family="Arial" font-weight="bold" font-size="16">Uniform Sampling</text>
  <path d="M 40,100 A 80,80 0 0 1 200,100" fill="none" stroke="#ccc" stroke-dasharray="4"/>
  <circle cx="70" cy="150" r="3" fill="blue" />
  <circle cx="130" cy="120" r="3" fill="blue" />
  <circle cx="180" cy="160" r="3" fill="blue" />
  <circle cx="100" cy="90" r="3" fill="blue" />

  <!-- Actually, just stick to simple labels and shapes first -->
  <g transform="translate(50, 100)">
    <path d="M 80,40 L 160,40 A 80,80 0 0 1 80,120" fill="none" stroke="#333" />
    <text x="95" y="-10" font-size="14">Uniform (Higher Variance)</text>
    <circle cx="120" cy="50" r="3" fill="blue" />
    <circle cx="150" cy="70" r="3" fill="blue" />
    <circle cx="90" cy="85" r="3" fill="blue" />
  </g>

  <g transform="translate(320, 100)">
    <path d="M 80,40 L 160,40 A 80,80 0 0 1 80,120" fill="none" stroke="#cccccc" />
    <text x="95" y="-10" font-size="14">Importance (Lower Variance)</text>
    <!-- Cluster points towards the zenith -->
    <circle cx="110" cy="40" r="3" fill="green" />
    <circle cx="120" cy="45" r="3" fill="green" />
    <circle cx="130" cy="50" r="3" fill="green" />
  </g>
</svg>