<?xml version="1.0" encoding="UTF-8"?>
<svg width="960" height="540" viewBox="0 0 960 540" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <!-- Arrow marker -->
        <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
        </marker>
        
        <!-- Gradient for function curve -->
        <linearGradient id="curveGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#e74c3c;stop-opacity:1"/>
            <stop offset="50%" style="stop-color:#ff6b8a;stop-opacity:1"/>
            <stop offset="100%" style="stop-color:#e74c3c;stop-opacity:1"/>
        </linearGradient>

        <!-- Shadow filter -->
        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
        </filter>

        <!-- Grid pattern -->
        <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
            <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#f0f0f0" stroke-width="0.5"/>
        </pattern>
    </defs>

    <!-- Background -->
    <rect width="100%" height="100%" fill="#fafbfc"/>
    
    <!-- Subtle grid background for plots -->
    <g transform="translate(80, 90)">
        <rect x="-20" y="-30" width="460" height="350" fill="url(#grid)" rx="10"/>
    </g>

    <!-- Title -->
    <text x="480" y="35" font-family="'Segoe UI', system-ui, sans-serif" font-size="28" text-anchor="middle" font-weight="700" fill="#2c3e50">Importance Sampling vs. Uniform Sampling</text>
    
    <!-- Subtitle -->
    <text x="480" y="60" font-family="'Segoe UI', system-ui, sans-serif" font-size="14" text-anchor="middle" fill="#7f8c8d">Monte Carlo Integration: Comparing sample distributions for the same target function</text>

    <!-- ================= LEFT PLOT: UNIFORM SAMPLING ================= -->
    
    <g transform="translate(60, 95)">
        <!-- Plot background with shadow -->
        <rect x="-10" y="-20" width="430" height="370" fill="#ffffff" rx="8" filter="url(#shadow)"/>
        
        <!-- Axes -->
        <line x1="60" y1="290" x2="350" y2="290" stroke="#34495e" stroke-width="2.5" marker-end="url(#arrowhead)"/>
        <line x1="205" y1="-10" x2="205" y2="310" stroke="#34495e" stroke-width="2.5" marker-end="url(#arrowhead)"/>

        <!-- Axis labels -->
        <text x="360" y="295" font-family="'Segoe UI', sans-serif" font-size="13" fill="#7f8c8d">x</text>
        <text x="215" y="-15" font-family="'Segoe UI', sans-serif" font-size="13" fill="#7f8c8d">y</text>

        <!-- Target Function f(x) - Gaussian-like curve -->
        <path d="M 60 285 C 140 285, 160 90, 205 90 C 250 90, 270 285, 350 285" 
              fill="none" stroke="#e74c3c" stroke-width="3.5"/>
        
        <!-- Function label -->
        <text x="160" y="75" font-family="'Segoe UI', sans-serif" font-size="14" font-style="italic" fill="#e74c3c">f(x)</text>

        <!-- Uniform Samples (evenly spaced along X) -->
        <g opacity="0.9">
            <!-- Sample 1 - Tail, low value -->
            <circle cx="85" cy="268" r="7" fill="#9b59b6"/>
            <line x1="85" y1="290" x2="85" y2="268" stroke="#9b59b6" stroke-width="1.5" opacity="0.4"/>

            <!-- Sample 2 - Lower slope -->
            <circle cx="130" cy="245" r="7" fill="#9b59b6"/>
            
            <!-- Sample 3 - Mid-slope -->
            <circle cx="175" cy="180" r="7" fill="#9b59b6"/>

            <!-- Samples near peak (undersampled relative to importance) -->
            <circle cx="205" cy="95" r="7" fill="#e74c3c" stroke="#fff" stroke-width="2.5"/> 
            <text x="205" y="118" font-family="'Segoe UI', sans-serif" font-size="11" text-anchor="middle" fill="#c0392b">Peak</text>

            <!-- Sample 4 - Symmetric to sample 3 -->
            <circle cx="235" cy="180" r="7" fill="#e7496"/>
            
            <!-- Sample 5 - Lower slope (symmetric) -->
            <circle cx="280" cy="245" r="7" fill="#9b59b6"/>

            <!-- Sample 6 - Tail, low value (wasted sample) -->
            <text x="315" y="275" font-family="'Segoe UI', sans-serif" font-size="10" text-anchor="middle" fill="#e74c3c">?</text>

            <!-- Connecting lines to show integration rectangles -->
            <line x1="85" y1="290" x2="85" y2="268" stroke="#9b59b6" stroke-width="1.5"/>
            <rect x="73" y="245" width="24" height="45" fill="#9b59b6" opacity="0.15"/>

            <!-- Show poor coverage of peak -->
            <circle cx="185" cy="120" r="5" fill="#e74c3c" stroke="#fff" stroke-width="1.5" opacity="0.7"/>
        </g>

        <!-- Annotation: High Variance indicator -->
        <path d="M 60 320 L 80 310 M 60 320 L 80 330" stroke="#e74c3c" stroke-width="2"/>
        
        <!-- Label Left -->
        <text x="205" y="350" font-family="'Segoe UI', sans-serif" font-size="19" text-anchor="middle" fill="#8e44ad">Uniform Sampling</text>

        <!-- Variance badge -->
        <rect x="165" y="360" width="80" height="28" rx="14" fill="#fadbd8"/>
        <text x="205" y="379" font-family="'Segoe UI', sans-serif" font-size="12" text-anchor="middle" fill="#c0392b">High Variance</text>

        <!-- Noise indicator -->
        <g transform="translate(60, 40)">
            <path d="M 5 8 L 10 2 L 15 7 L 20 3" fill="none" stroke="#e74c3c" stroke-width="1.5"/>
        </g>

    </g>


    <!-- ================= RIGHT PLOT: IMPORTANCE SAMPLING ================= -->

    <g transform="translate(480, 95)">
        <!-- Plot background with shadow -->
        <rect x="-10" y="-20" width="430" height="370" fill="#ffffff" rx="8" filter="url(#shadow)"/>

        <!-- Axes -->
        <line x1="60" y1="290" x2="350" y2="290" stroke="#34495e" stroke-width="2.5" marker-end="url(#arrowhead)"/>
        <line x1="205" y1="-10" x2="205" y2="310" stroke="#34495e" stroke-width="2.5" marker-end="url(#arrowhead)"/>

        <!-- Axis labels -->
        <text x="360" y="295" font-family="'Segoe UI', sans-serif" font-size="13" fill="#7f8c8d">x</text>
        <text x="215" y="-15" font-family="'Segoe UI', sans-serif" font-size="13" fill="#7f8c8d">y</text>

        <!-- Target Function f(x) - Same shape -->
        <path d="M 60 285 C 140 285, 160 90, 205 90 C 250 90, 270 285, 350 285" 
              fill="none" stroke="#e74c3c" stroke-width="3.5"/>
        
        <!-- Function label -->
        <text x="160" y="75" font-family="'Segoe UI', sans-serif" font-size="14" font-style="italic" fill="#e74c3c">f(x)</text>

        <!-- Importance Samples (denser near peak) -->
        <g opacity="0.9">
            <!-- Few samples in tails -->
            <circle cx="85" cy="268" r="7" fill="#1abc9c"/>
            
            <!-- Increasing density towards peak -->
            <circle cx="130" cy="245" r="7" fill="#1abc9c"/>

            <!-- High Density at Peak (Low Variance) - Clustered samples -->
            <circle cx="185" cy="110" r="7" fill="#e67e22" stroke="#fff" stroke-width="2.5"/> 
            <text x="185" y="133" font-family="'Segoe UI', sans-serif" font-size="11" text-anchor="middle" fill="#d35400">Peak</text>
            
            <!-- Many samples here -->
            <circle cx="205" cy="95" r="7" fill="#e67e22" stroke="#fff" stroke-width="2.5"/> 
            <line x1="205" y1="90" x2="205" y2="290" stroke="#f39c12" stroke-width="1.5" stroke-dasharray="4,3"/>
            
            <!-- More samples clustered -->
            <circle cx="225" cy="108" r="7" fill="#e67e22" stroke="#fff" stroke-width="2.5"/> 
            <circle cx="195" cy="125" r="7" fill="#f39c12" opacity="0.8"/>
            
            <!-- Tapering off -->
            <circle cx="260" cy="145" r="7" fill="#1abc9c"/>

            <text x="315" y="275" font-family="'Segoe UI', sans-serif" font-size="10" text-anchor="middle" fill="#1abc9c">✓</text>
        </g>

        <!-- Annotation: Low Variance indicator -->
        <path d="M 60 320 L 80 315 M 60 320 L 80 325" stroke="#27ae60" stroke-width="2"/>
        
        <!-- Label Right -->
        <text x="205" y="350" font-family="'Segoe UI', sans-serif" font-size="19" text-anchor="middle" fill="#1abc9c">Importance Sampling</text>

        <!-- Variance badge -->
        <rect x="165" y="360" width="80" height="28" rx="14" fill="#d5f5e3"/>
        <text x="205" y="379" font-family="'Segoe UI', sans-serif" font-size="12" text-anchor="middle" fill="#27ae60">Low Variance</text>

    </g>


    <!-- ================= COMPARISON ARROW / TRANSITION ================= -->
    
    <path d="M 435 280 L 465 280" stroke="#bdc3c7" stroke-width="2.5" marker-end="url(#arrowhead)"/>

    <!-- ================= LEGEND BOXES ================= -->

    <g transform="translate(310, 440)">
        <rect x="-90" y="-25" width="180" height="75" rx="10" fill="#ffffff" stroke="#e0e6ed"/>
        
        <!-- Target function legend -->
        <circle cx="-65" cy="-5" r="4" fill="#e74c3c"/> 
        <text x="-52" y="0" font-family="'Segoe UI', sans-serif" font-size="11">Target Function f(x)</text>

        <!-- Uniform samples legend -->
        <rect x="-68" y="12" width="9" height="9" fill="#9b59b6"/> 
        <text x="-50" y="20" font-family="'Segoe UI', sans-serif" font-size="11">Uniform Samples</text>
        
        <!-- Importance samples legend -->
        <rect x="-68" y="30" width="9" height="9" fill="#e67e22"/> 
        <text x="-50" y="38" font-family="'Segoe UI', sans-serif" font-size="11">Importance Samples</text>
    </g>


    <!-- ================= KEY INSIGHT BOXES ================= -->

    <!-- Left insight box -->
    <rect x="40" y="465" width="230" height="70" rx="8" fill="#fff5f5"/>
    <text x="155" y="490" font-family="'Segoe UI', sans-serif" font-size="13" text-anchor="middle" font-weight="600" fill="#c0392b">Uniform Sampling Problem</text>
    <text x="155" y="508" font-family="'Segoe UI', sans-serif" font-size="11" text-anchor="middle" fill="#e74c3c">• Samples wasted in low-value regions</text>
    <text x="155" y="523" font-family="'Segoe UI', sans-serif" font-size="11" text-anchor="middle" fill="#e74c3c">• Poor peak coverage → noisy estimate</text>

    <!-- Right insight box -->
    <rect x="690" y="465" width="230" height="70" rx="8" fill="#f0fff4"/>
    <text x="805" y="490" font-family="'Segoe UI', sans-serif" font-size="13" text-anchor="middle" font-weight="600" fill="#27ae60">Importance Sampling Benefit</text>
    <text x="805" y="508" font-family="'Segoe UI', sans-serif" font-size="11" text-anchor="middle" fill="#1abc9c">• Samples concentrated in high-value regions</text>
    <text x="805" y="523" font-family="'Segoe UI', sans-serif" font-size="11" text-anchor="middle" fill="#1abc9c">• Better peak coverage → smooth estimate</text>

</svg>