<svg width="600" height="400" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="white"/>
  <text x="20" y="30" font-family="Arial" font-weight="bold" font-size="16">BVH Hierarchy Structure</text>

  <!-- Root Node -->
  <rect x="200" y="100" width="200" height="80" fill="#f0f0f0" stroke="#333" stroke-width="2"/>
  <text x="285" y="145" font-family="Arial" font-size="14">Root (AABB)</text>

  <!-- Branches -->
  <line x1="300" y1="180" x2="160" y="250" stroke="#999" stroke-width="1" />
  <line x1="300" y1="180" x2="440" y="250" stroke="#999" stroke-width="1" />

  <!-- Child Nodes -->
  <rect x="100" y="250" width="120" height="80" fill="#e6f3ff" stroke="#333" stroke-width="2"/>
  <text x="135" y="300" font-family="Arial" font-size="14">Left Branch</text>

  <rect x="380" y="250" width="120" height="80" fill="#fff7e6" stroke="#333" stroke-width="2"/>
  <text x="415" y="300" font-family="Arial" font-size="14">Right Branch</text>

  <!-- Leaf representation -->
  <circle cx="160" cy="340" r="10" fill="green"/>
  <text x="125" y="365" font-family="Arial" font-size="12">Leaf (Triangle)</text>

  <circle cx="440" cy="340" r="10" fill="green"/>
  <text x="415" y="365" font-family="Arial" font-size="12">Leaf (Triangle)</text>

  <text x="20" y="380" font-family="Arial" font-size="12" fill="#666">Optimized Search Path (O(log N))</text>
</svg>